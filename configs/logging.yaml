# ==============================================================================
# configs/logging.yaml  — Standard logging configuration for HRM OCR API
# ==============================================================================
version: 1
disable_existing_loggers: false

formatters:
  standard:
    format: "%(asctime)s [%(levelname)-8s] %(name)s — %(message)s"
    datefmt: "%Y-%m-%dT%H:%M:%S"
  json:
    # Structured JSON logs for production / log aggregation pipelines
    "()": "pythonjsonlogger.jsonlogger.JsonFormatter"
    format: "%(asctime)s %(levelname)s %(name)s %(message)s %(request_id)s"

handlers:
  console:
    class: logging.StreamHandler
    level: DEBUG
    formatter: standard
    stream: ext://sys.stdout

  file_info:
    class: logging.handlers.RotatingFileHandler
    level: INFO
    formatter: json
    filename: logs/hrm_ocr.log
    maxBytes: 10485760    # 10 MB
    backupCount: 5
    encoding: utf-8

  file_error:
    class: logging.handlers.RotatingFileHandler
    level: ERROR
    formatter: json
    filename: logs/hrm_ocr_error.log
    maxBytes: 5242880     # 5 MB
    backupCount: 3
    encoding: utf-8

loggers:
  hrm_ocr:
    level: DEBUG
    handlers: [console, file_info, file_error]
    propagate: false

  uvicorn:
    level: INFO
    handlers: [console]
    propagate: false

  uvicorn.error:
    level: INFO

  uvicorn.access:
    level: INFO
    handlers: [console]
    propagate: false

root:
  level: WARNING
  handlers: [console]
